name: Knob
options:
  bundleIdPrefix: com.mrkcnd
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Knob:
    type: application
    platform: macOS
    sources:
      - path: Knob/App
      - path: Knob/Sources
        optional: true
    resources:
      - path: Knob/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrkcnd.knob
        INFOPLIST_FILE: Knob/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Knob/Support/Knob.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_OBJC_BRIDGING_HEADER: Knob/Support/Knob-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/whisper.cpp/build/install/include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/vendor/whisper.cpp/build/install/lib
        OTHER_LDFLAGS:
          - -lwhisper
          - -lggml
          - -lggml-base
          - -lggml-cpu
          - -lggml-metal
          - -lggml-blas
          - -lstdc++
          - -framework Accelerate
          - -framework Metal
          - -framework MetalKit
          - -framework Foundation
        SWIFT_STRICT_CONCURRENCY: complete
    preBuildScripts:
      - name: Build whisper.cpp
        script: |
          bash "${SRCROOT}/Knob/Scripts/build-whisper.sh"
        basedOnDependencyAnalysis: false
